name: Latest blog post workflow

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # lets you run it manually from GitHub Actions tab

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest posts from idiotswithios.com
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://idiotswithios.com/feed/"
          max_post_count: 3
          template: "$newline- [$title]($url)"
          commit_message: "chore: update README with latest blog posts"